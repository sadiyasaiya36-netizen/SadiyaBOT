<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAIR CODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #141414;
      background-image: url('https://pin.it/36KqPH5FU');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      font-family: 'Arial', sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Dark overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    /* Lightning canvas */
    #lightning-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Animated particles */
    .particles {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(220, 20, 60, 0.8);
      border-radius: 50%;
      animation: float 15s infinite;
      box-shadow: 0 0 6px rgba(220, 20, 60, 0.8);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 15px;
    }

    .system-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .status-left {
      color: #ff3333;
      display: flex;
      align-items: center;
      gap: 5px;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
    }

    .status-left::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #ff3333;
      border-radius: 50%;
      animation: pulse 2s infinite;
      box-shadow: 0 0 10px #ff3333;
    }

    .status-right {
      color: #ff3333;
      border: 1px solid #ff3333;
      padding: 3px 10px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0, 0, 0, 0.5);
      font-size: 9px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .crown-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .crown-line .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ff3333, transparent);
      animation: lineGlow 2s ease-in-out infinite alternate;
    }

    @keyframes lineGlow {
      0% { opacity: 0.5; }
      100% { opacity: 1; box-shadow: 0 0 10px #ff3333; }
    }

    .crown {
      font-size: 16px;
      color: #ff3333;
      text-shadow: 0 0 20px rgba(255, 51, 51, 0.8);
      animation: crownBounce 2s ease-in-out infinite;
    }

    @keyframes crownBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #ff3333;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 3px;
      text-shadow: 0 0 30px rgba(255, 51, 51, 0.8), 0 0 60px rgba(255, 51, 51, 0.4);
      font-style: italic;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 30px rgba(255, 51, 51, 0.8), 0 0 60px rgba(255, 51, 51, 0.4); }
      100% { text-shadow: 0 0 50px rgba(255, 51, 51, 1), 0 0 100px rgba(255, 51, 51, 0.6); }
    }

    .title span {
      color: #fff;
      font-style: normal;
    }

    .subtitle {
      font-size: 10px;
      color: #ff6666;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 102, 102, 0.5);
      animation: subtitlePulse 3s ease-in-out infinite;
    }

    @keyframes subtitlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Avatar - FIXED */
    .avatar-container {
      display: flex;
      justify-content: center;
      margin: 15px 0;
      position: relative;
      z-index: 10;
    }

    .avatar-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #ff3333;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 51, 51, 0.6), 0 0 40px rgba(255, 51, 51, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      animation: avatarPulse 3s ease-in-out infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 51, 51, 0.6), 0 0 40px rgba(255, 51, 51, 0.3); }
      50% { box-shadow: 0 0 40px rgba(255, 51, 51, 0.8), 0 0 80px rgba(255, 51, 51, 0.5); }
    }

    .avatar-circle::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid transparent;
      border-top-color: #ff3333;
      border-radius: 50%;
      animation: rotate 3s linear infinite;
      z-index: 2;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Main box - EXACTLY like original but styled */
    .box {
      width: 300px;
      padding: 20px;
      position: relative;
      text-align: center;
      background-color: rgba(10, 0, 0, 0.9);
      border-radius: 10px;
      transform: perspective(1000px) rotateY(0deg);
      box-shadow: 0 0 20px rgba(255, 51, 51, 0.4), inset 0 0 20px rgba(255, 51, 51, 0.1);
      border: 1px solid rgba(255, 51, 51, 0.3);
      position: relative;
      animation: boxGlow 4s ease-in-out infinite alternate;
    }

    @keyframes boxGlow {
      0% { box-shadow: 0 0 20px rgba(255, 51, 51, 0.4); }
      100% { box-shadow: 0 0 40px rgba(255, 51, 51, 0.6); }
    }

    #text {
      color: #ffffff;
    }

    .centered-text {
      color: #ffffff;
      text-align: center;
    }

    /* Card title inside box */
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .card-title i {
      color: #ff3333;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
    }

    .card-title span {
      color: #ff3333;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
    }

    .card-desc {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 15px;
    }

    .card-desc span {
      color: #ff3333;
      font-weight: 600;
      text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
    }

    /* Input container - EXACTLY like original */
    .input-container {
      display: flex;
      background: #ffffff;
      border-radius: 1rem;
      padding: 0.3rem;
      gap: 0.3rem;
      max-width: 300px;
      width: 100%;
      border: 1px solid #ff3333;
      box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
    }

    .input-container input {
      border-radius: 0.8rem 0 0 0.8rem;
      background: #000000;
      width: 89%;
      flex-basis: 75%;
      padding: 1rem;
      border: none;
      border-left: 2px solid #ff3333;
      color: #ecf0f1;
      transition: all 0.2s ease-in-out;
      font-size: 14px;
    }

    .input-container input:focus {
      border-left: 2px solid #ff3333;
      outline: none;
      box-shadow: inset 13px 13px 10px rgba(255, 51, 51, 0.3), inset -13px -13px 10px rgba(139, 0, 0, 0.3);
    }

    .input-container button {
      flex-basis: 25%;
      padding: 1rem;
      background: linear-gradient(135deg, #8b0000, #cc0000);
      font-weight: 900;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      color: white;
      border: none;
      width: 100%;
      border-radius: 0 1rem 1rem 0;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
      animation: buttonPulse 2s ease-in-out infinite;
    }

    @keyframes buttonPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 51, 51, 0.3); }
      50% { box-shadow: 0 0 20px rgba(255, 51, 51, 0.5); }
    }

    .input-container button:hover {
      background: linear-gradient(135deg, #cc0000, #ff3333);
      box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
    }

    /* Waiting message */
    #waiting-message {
      color: #ffffff;
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* Loading spinner */
    #loading-spinner {
      display: none;
      color: #ff3333;
      margin-top: 10px;
    }

    .fa-spinner {
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Skull decoration */
    .skull-decoration {
      text-align: center;
      margin: 15px 0;
    }

    .skull-decoration i {
      font-size: 25px;
      color: #ff3333;
      opacity: 0.8;
      text-shadow: 0 0 20px rgba(255, 51, 51, 0.8);
      animation: skullBounce 2s ease-in-out infinite;
    }

    @keyframes skullBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      width: 100%;
      max-width: 300px;
    }

    .footer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ff3333;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 12px;
      border-radius: 3px;
      border: 1px solid rgba(255, 51, 51, 0.3);
      animation: footerGlow 3s ease-in-out infinite alternate;
    }

    @keyframes footerGlow {
      0% { box-shadow: 0 0 5px rgba(255, 51, 51, 0.2); }
      100% { box-shadow: 0 0 15px rgba(255, 51, 51, 0.4); }
    }

    .footer-item i {
      font-size: 16px;
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .footer-item .small {
      font-size: 8px;
      color: #666;
      display: block;
    }

    .footer-center {
      text-align: center;
      color: #ff3333;
    }

    .footer-center .team {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
      animation: teamGlow 3s ease-in-out infinite alternate;
    }

    @keyframes teamGlow {
      0% { text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); }
      100% { text-shadow: 0 0 20px rgba(255, 51, 51, 0.8); }
    }

    .footer-center .powered {
      font-size: 8px;
      color: #666;
      letter-spacing: 1px;
      margin-top: 3px;
    }

    @media (max-width: 500px) {
      .input-container {
        flex-direction: column;
      }

      .input-container input {
        border-radius: 0.8rem;
      }

      .input-container button {
        padding: 1rem;
        border-radius: 0.8rem;
      }

      .box {
        width: 90%;
      }

      .footer {
        flex-direction: column;
        gap: 10px;
      }

      .footer-item {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Lightning Canvas -->
  <canvas id="lightning-canvas"></canvas>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="system-status">
        <div class="status-left">SYSTEM ONLINE</div>
        <div class="status-right">
          <i class="fas fa-robot"></i>
          BOT STATUS: ONLINE
        </div>
      </div>

      <div class="crown-line">
        <div class="line"></div>
        <div class="crown">
          <i class="fas fa-crown"></i>
        </div>
        <div class="line"></div>
      </div>

      <div class="title">ZORO<span>-</span>MD</div>
      <div class="subtitle">Legend Never Die</div>
    </div>

    <!-- Avatar - FIXED with URL -->
    <div class="avatar-container">
      <div class="avatar-circle">
        <img src="https://pin.it/36KqPH5FU" alt="ZORO" class="avatar-img" onerror="this.style.display='none'">
      </div>
    </div>

    <!-- Main Box - EXACTLY like original structure -->
    <div class="box" id="box">
      <div id="text">
        <p>
          <div class="card-title">
            <i class="fas fa-link"></i>
            LINK <span>WHATSAPP</span>PHONE NUMBER
          </div>
          <div class="card-desc">
            Enter your number with country code. <span>ZORO - MD</span> PAIR SYSTEM
          </div>
          <div class="input-container">
            <input placeholder="+94704xxxxxx" type="number" id="number" placeholder="❗ Enter your phone number with country code, ROBIN WEB PAIR" name="">
            <button id="submit">Submit ROBIN</button>
          </div>
          <!-- Add the loading spinner -->
          <div id="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
          </div>
          <br>
          <br>
          <main id="pair"></main>
        </p>
      </div>
    </div>

    <!-- Skull decoration -->
    <div class="skull-decoration">
      <i class="fas fa-skull-crossbones"></i>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-item">
        <i class="fas fa-shield-alt"></i>
        <div>
          <div>SECURE</div>
          <div class="small">ENCRYPTED</div>
        </div>
      </div>

      <div class="footer-center">
        <div class="team">ZORO - MD OFFICIAL SYSTEM</div>
        <div class="powered">POWERED BY DARK LEGEND TEAM</div>
      </div>

      <div class="footer-item">
        <i class="fas fa-bolt"></i>
        <div>
          <div>ULTRA</div>
          <div class="small">FAST PAIR</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    // Create particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (10 + Math.random() * 10) + 's';
      particlesContainer.appendChild(particle);
    }

    // Lightning Canvas Effect
    const canvas = document.getElementById('lightning-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function drawLightning() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const startX = Math.random() * canvas.width;
      const startY = 0;
      const endX = Math.random() * canvas.width;
      const endY = canvas.height;

      ctx.beginPath();
      ctx.moveTo(startX, startY);

      let currentX = startX;
      let currentY = startY;
      const segments = 20;
      const segmentHeight = canvas.height / segments;

      for (let i = 0; i < segments; i++) {
        currentX += (Math.random() - 0.5) * 100;
        currentY += segmentHeight;
        ctx.lineTo(currentX, currentY);
      }

      ctx.lineTo(endX, endY);

      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.stroke();

      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 100);
    }

    setInterval(() => {
      if (Math.random() > 0.6) {
        drawLightning();
      }
    }, 2000);

    // EXACTLY like original JavaScript
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");
    let box = document.getElementById("box");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "✔️ COPIED";
      obj.style = "color:#00ff00;font-weight:bold";
      obj.size = "5";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:#ff3333;font-weight-bold";
        obj.size = "5";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<a style="color:#ff3333;font-weight:bold">❗Enter your whatsapp number with country code.</a><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<a style="color:#ff3333;font-weight:bold">❗Invalid number format. Please try again.</a><br><br>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "";
        let bbc = "";
        const cc = bc.split('');
        cc.map(a => {
          bbc += a;
          if (bbc.length == 3) {
            bb += " " + a;
          } else if (bbc.length == 8) {
            bb += " " + a;
          } else {
            bb += a;
          }
        });
        c.type = "text";
        c.value = "+" + bb;
        c.style = "color:#ff3333;font-size:20px";
        // Show the loading spinner
        document.getElementById("loading-spinner").style.display = "block";
        a.innerHTML = ''; // Clear the previous content

        // Lightning on submit
        for (let i = 0; i < 2; i++) {
          setTimeout(() => drawLightning(), i * 300);
        }

        let { data } = await axios(`/code?number=${bc}`);
        let code = data.code || "❗ Service Unavailable";
        a.innerHTML = '<font id="copy" onclick="Copy()" style="color:#ff3333;font-weight:bold" size="5">CODE: <span style="color:#00ff00;font-weight:bold">' + code + '</span></font><br><br><br>';
        // Hide the loading spinner when the process is complete
        document.getElementById("loading-spinner").style.display = "none";

        // Lightning on success
        for (let i = 0; i < 3; i++) {
          setTimeout(() => drawLightning(), i * 200);
        }
      }
    });
  </script>
</body>
</html>
